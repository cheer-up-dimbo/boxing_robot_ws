name: boxing_ai
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - setuptools
  - wheel

  # Core runtime
  - numpy=1.26.*
  - scipy=1.15.*
  - scikit-learn=1.7.*
  - matplotlib
  - opencv
  - pillow
  - pyyaml
  - requests
  - tqdm
  - psutil

  # Robotics / build helpers used by ROS2 Python workflows
  - catkin_pkg
  - empy

  # Sensor / UI / inference stack
  - pyrealsense2
  - pyside6=6.8.*
  - smbus2
  - onnxruntime
  - pytorch=2.3.*
  - torchvision=0.18.*

  - pip:
      - ultralytics==8.4.6
      - mmengine==0.10.7
      - rosbags==0.11.0
      - pycocotools==2.0.11
