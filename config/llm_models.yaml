# Available LLM models for BoxBunny AI Coach
# The chat GUI can switch between these models

models:
  - name: "Gemma 4 E2B (Default)"
    path: "models/llm/gemma-4-E2B-it-Q4_K_M.gguf"
    description: "Google Gemma 4 E2B — edge-optimized, strong instruction-following"
    n_ctx: 2048
    n_gpu_layers: -1

  - name: "Qwen2.5-3B (Previous)"
    path: "models/llm/qwen2.5-3b-instruct-q4_k_m.gguf"
    description: "Qwen 2.5 3B Instruct — fast, good for coaching tips"
    n_ctx: 2048
    n_gpu_layers: -1

  - name: "Qwen2.5-1.5B (Lightweight)"
    path: "models/llm/qwen2.5-1.5b-instruct-q4_k_m.gguf"
    description: "Qwen 2.5 1.5B Instruct — smallest, fastest option"
    n_ctx: 2048
    n_gpu_layers: -1
